name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  ci:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Backend tests
        run: |
          cd backend
          npm test

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: TypeScript check
        run: |
          cd frontend
          yarn tsc --noEmit

      - name: Frontend tests
        run: |
          cd frontend
          yarn test

      - name: Build frontend
        run: |
          cd frontend
          yarn build

      - name: Backend security audit
        run: |
          cd backend
          npm audit --audit-level=high

      - name: Frontend security audit
        run: |
          cd frontend
          yarn audit || true

      - name: Docker build
        run: docker compose build